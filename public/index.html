<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mela Hub Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans h-screen flex flex-col">

  <div id="auth-screen" class="flex-1 flex flex-col justify-center items-center px-6">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-700">
      <h2 class="text-3xl font-bold text-center mb-6 text-emerald-400">Mela Hub</h2>
      <div class="space-y-4">
        <input id="username" type="text" placeholder="Username" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 focus:outline-none focus:border-emerald-500">
        <input id="password" type="password" placeholder="Password" class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 focus:outline-none focus:border-emerald-500">
        <button id="login-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold p-4 rounded-xl transition duration-200">Login</button>
        <button id="register-btn" class="w-full bg-gray-700 hover:bg-gray-600 text-gray-300 font-bold p-4 rounded-xl transition duration-200">Register</button>
      </div>
      <p id="auth-error" class="text-red-500 text-sm mt-4 text-center hidden"></p>
    </div>
  </div>

  <div id="chat-screen" class="hidden flex-1 flex flex-col h-full">
    <header class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center shadow-md">
      <div>
        <h1 class="text-xl font-bold text-emerald-400">Mela Room</h1>
        <p id="online-counter" class="text-xs text-gray-400">Online: 0</p>
      </div>
      <button id="logout-btn" class="text-sm bg-red-600/20 hover:bg-red-600/40 text-red-400 px-4 py-2 rounded-lg border border-red-500/30 transition">Logout</button>
    </header>

    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-950"></div>

    <div class="p-4 bg-gray-800 border-t border-gray-700 flex items-center gap-2">
      <input id="message-input" type="text" placeholder="Type a secure message..." class="flex-1 p-3 rounded-xl bg-gray-900 border border-gray-700 focus:outline-none focus:border-emerald-500 text-white">
      <button id="send-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-3 rounded-xl transition">Send</button>
    </div>
  </div>

  <script src="/push.js"></script>
  <script>
    const socket = io();
    let currentUser = "";

    // DOM Elements
    const authScreen = document.getElementById('auth-screen');
    const chatScreen = document.getElementById('chat-screen');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const authError = document.getElementById('auth-error');
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const onlineCounter = document.getElementById('online-counter');
    const logoutBtn = document.getElementById('logout-btn');

    function showError(msg) {
      authError.textContent = msg;
      authError.classList.remove('hidden');
    }

    // Auth Action Handlers
    loginBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) return showError('Please fill in all fields');
      socket.emit('login', { username, password });
    });

    registerBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) return showError('Please fill in all fields');
      socket.emit('register', { username, password });
    });

    logoutBtn.addEventListener('click', () => {
      window.location.reload();
    });

    // Socket Responses
    socket.on('auth_success', (data) => {
      currentUser = data.username;
      authScreen.classList.add('hidden');
      chatScreen.classList.remove('hidden');
      
      // Initialize push notifications safely if loaded
      if (typeof initPushNotifications === 'function') {
        initPushNotifications(data.username);
      }
    });

    socket.on('auth_error', (msg) => {
      showError(msg);
    });

    socket.on('update_online_count', (count) => {
      onlineCounter.textContent = `Online: ${count}`;
    });

    // Chat Functionality
    function appendMessage(data) {
      const isMe = data.username === currentUser;
      const msgDiv = document.createElement('div');
      msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;

      msgDiv.innerHTML = `
        <span class="text-xs text-gray-500 mb-1 px-1">${data.username}</span>
        <div class="max-w-[75%] p-3 rounded-2xl shadow ${isMe ? 'bg-emerald-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-200 rounded-tl-none'}">
          <p class="break-words">${data.text}</p>
        </div>
      `;
      messagesContainer.appendChild(msgDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      socket.emit('chat_message', { username: currentUser, text });
      messageInput.value = '';
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    socket.on('chat_message', (data) => {
      appendMessage(data);
    });
  </script>
</body>
</html>
